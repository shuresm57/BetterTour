services:
  app:
    image: ghcr.io/shuresm57/bettertour:latest
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/bettertour.db
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - db-data:/data
    restart: unless-stopped

volumes:
  db-data:
